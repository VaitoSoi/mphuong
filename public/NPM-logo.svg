<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 110 70" width="110" height="70">
  <defs>
    <filter id="soft-shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="3" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Khối bóng cứng màu vàng -->
  <rect x="16" y="16" width="76" height="40" rx="2" fill="#fde047" filter="url(#soft-shadow)" />

  <!-- Khối nền chính màu đen trầm -->
  <rect x="12" y="12" width="76" height="40" rx="2" fill="#1c1917" />

  <!-- Chữ MP. -->
  <text 
    x="50" 
    y="39" 
    font-family="Montserrat, system-ui, sans-serif" 
    font-weight="900" 
    font-size="20" 
    fill="#fdfbf7" 
    text-anchor="middle" 
    letter-spacing="2">
    MP.
  </text>
</svg>
